<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>As nossas tarefas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #f0f4f8; min-height: 100vh; }
  .app { padding: 1rem; max-width: 500px; margin: 0 auto; }
  .screen { display: none; }
  .screen.active { display: block; }

  .selector { text-align: center; padding: 2rem 1rem; }
  .selector h1 { font-size: 24px; font-weight: 800; color: #1a1a1a; margin-bottom: 0.3rem; }
  .sel-date { font-size: 14px; color: #888; margin-bottom: 2rem; }
  .profiles { display: flex; gap: 16px; justify-content: center; }
  .profile-btn { width: 150px; padding: 1.5rem 1rem; border-radius: 16px; background: #fff; border: 1px solid #e5e5e5; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .profile-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
  .avatar { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; }
  .av-pedro { background: #E6F1FB; color: #185FA5; }
  .av-alice { background: #FBEAF0; color: #993556; }
  .profile-name { font-size: 16px; font-weight: 700; color: #1a1a1a; }
  .profile-meta { font-size: 12px; color: #888; text-align: center; line-height: 1.5; }
  .loading { text-align: center; padding: 3rem 1rem; color: #888; font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e5e5e5; border-top-color: #185FA5; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .top-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #eee; }
  .avatar-sm { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; flex-shrink: 0; }
  .top-bar h2 { font-size: 18px; font-weight: 800; color: #1a1a1a; flex: 1; }
  .back-btn { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 5px 10px; cursor: pointer; font-size: 13px; color: #666; font-family: 'Nunito', sans-serif; }
  .back-btn:hover { background: #f5f5f5; }
  .stars-pill { font-size: 13px; font-weight: 700; padding: 4px 12px; border-radius: 20px; }
  .sp-pedro { background: #B5D4F4; color: #0C447C; }
  .sp-alice { background: #F4C0D1; color: #72243E; }

  .days-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 1rem; scrollbar-width: none; }
  .days-scroll::-webkit-scrollbar { display: none; }
  .day-chip { flex-shrink: 0; padding: 8px 10px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid #e5e5e5; background: #fff; transition: all 0.15s; min-width: 60px; }
  .day-chip:hover { border-color: #aaa; }
  .day-name { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; color: #aaa; }
  .day-date { font-size: 16px; font-weight: 800; color: #1a1a1a; line-height: 1.3; }
  .day-month { font-size: 10px; color: #bbb; font-weight: 600; }
  .day-dot { width: 4px; height: 4px; border-radius: 50%; margin: 3px auto 0; }
  .dd-pedro { background: #185FA5; }
  .dd-alice { background: #993556; }
  .dc-pedro.active { background: #185FA5; border-color: #185FA5; }
  .dc-pedro.active .day-name, .dc-pedro.active .day-date, .dc-pedro.active .day-month { color: #E6F1FB; }
  .dc-alice.active { background: #993556; border-color: #993556; }
  .dc-alice.active .day-name, .dc-alice.active .day-date, .dc-alice.active .day-month { color: #FBEAF0; }
  .dc-pedro.active .day-dot, .dc-alice.active .day-dot { background: rgba(255,255,255,0.5); }
  .today-chip { border-color: #999 !important; }

  .prog-wrap { margin-bottom: 1rem; }
  .prog-top { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 4px; }
  .prog-track { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .pf-pedro { background: #185FA5; }
  .pf-alice { background: #993556; }

  .period-tabs { display: flex; gap: 6px; margin-bottom: 1rem; }
  .ptab { flex: 1; padding: 8px 4px; border-radius: 10px; font-size: 12px; font-weight: 700; text-align: center; cursor: pointer; border: 1px solid #e5e5e5; background: #fff; color: #888; font-family: 'Nunito', sans-serif; transition: all 0.15s; }
  .ptab:hover { border-color: #aaa; }
  .pt-pedro.active { background: #E6F1FB; color: #185FA5; border-color: #378ADD; }
  .pt-alice.active { background: #FBEAF0; color: #993556; border-color: #D4537E; }
  .ptab .pcnt { font-size: 10px; display: block; opacity: 0.8; margin-top: 1px; }

  .tasks-list { display: flex; flex-direction: column; gap: 7px; }
  .task-item { display: flex; align-items: flex-start; gap: 10px; background: #fff; border: 1px solid #eee; border-radius: 14px; padding: 0.75rem 1rem; cursor: pointer; transition: all 0.15s; }
  .task-item:hover { border-color: #ccc; }
  .task-item.done { background: #f9f9f9; opacity: 0.6; }
  .task-item.done .task-label { text-decoration: line-through; color: #aaa; }
  .task-item.done .task-note { text-decoration: line-through; }
  .checkbox { width: 22px; height: 22px; min-width: 22px; border-radius: 6px; border: 1.5px solid #ccc; display: flex; align-items: center; justify-content: center; background: #fff; margin-top: 1px; transition: all 0.15s; }
  .task-item.done .cb-pedro { background: #185FA5; border-color: #185FA5; }
  .task-item.done .cb-alice { background: #993556; border-color: #993556; }
  .checkmark { width: 12px; height: 12px; display: none; }
  .task-item.done .checkmark { display: block; }
  .task-body { flex: 1; }
  .task-label { font-size: 14px; font-weight: 600; color: #1a1a1a; line-height: 1.4; }
  .task-note { font-size: 12px; color: #888; margin-top: 3px; line-height: 1.4; }
  .tn-foto { color: #185FA5; font-weight: 700; }
  .tn-hora { color: #854F0B; font-weight: 700; }
  .tn-livros { color: #555; }
  .badge { font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
  .bd-pedro { background: #B5D4F4; color: #0C447C; }
  .bd-alice { background: #F4C0D1; color: #72243E; }
  .empty { text-align: center; padding: 2rem; color: #bbb; font-size: 14px; }

  .action-bar { display: flex; gap: 8px; margin-top: 1.25rem; }
  .action-btn { flex: 1; padding: 9px; border-radius: 10px; border: 1px solid #e5e5e5; background: #fff; font-size: 12px; font-weight: 700; color: #666; cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.15s; }
  .action-btn:hover { border-color: #bbb; background: #f5f5f5; }
  .action-btn.red:hover { border-color: #f09595; color: #A32D2D; background: #FCEBEB; }

  .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: flex-end; justify-content: center; padding: 1rem; }
  .overlay.open { display: flex; }
  .sheet { background: #fff; border-radius: 20px 20px 16px 16px; padding: 1.5rem; width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; }
  .sheet h3 { font-size: 18px; font-weight: 800; color: #1a1a1a; margin-bottom: 0.2rem; }
  .sheet .sub { font-size: 13px; color: #888; margin-bottom: 1.25rem; }
  .sum-profile { margin-bottom: 1.25rem; }
  .sum-profile h4 { font-size: 15px; font-weight: 800; margin-bottom: 0.6rem; }
  .h4-pedro { color: #185FA5; }
  .h4-alice { color: #993556; }
  .sum-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .sum-day { font-size: 11px; font-weight: 700; color: #888; width: 28px; }
  .sum-bar-wrap { flex: 1; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
  .sum-bar { height: 100%; border-radius: 4px; }
  .sb-pedro { background: #185FA5; }
  .sb-alice { background: #993556; }
  .sum-pct { font-size: 11px; font-weight: 700; color: #888; width: 30px; text-align: right; }
  .sum-total { font-size: 12px; color: #888; margin-top: 6px; padding-top: 6px; border-top: 1px solid #f0f0f0; }
  .divider { border: none; border-top: 1px solid #eee; margin: 1rem 0; }
  .close-btn { width: 100%; padding: 11px; border-radius: 10px; border: 1px solid #e5e5e5; background: #f5f5f5; font-size: 14px; font-weight: 700; color: #555; cursor: pointer; font-family: 'Nunito', sans-serif; margin-top: 1rem; }
  .close-btn:hover { background: #eee; }

  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 20px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <div class="screen active" id="s-select">
    <div class="selector">
      <h1>As nossas tarefas</h1>
      <div class="sel-date" id="sel-date"></div>
      <div id="sel-loading" class="loading"><div class="spinner"></div>A carregar tarefas...</div>
      <div class="profiles" id="profiles-wrap" style="display:none">
        <button class="profile-btn" onclick="openProfile('pedro')">
          <div class="avatar av-pedro">PE</div>
          <div class="profile-name">Pedro</div>
          <div class="profile-meta" id="meta-pedro">—</div>
        </button>
        <button class="profile-btn" onclick="openProfile('alice')">
          <div class="avatar av-alice">AL</div>
          <div class="profile-name">Alice</div>
          <div class="profile-meta" id="meta-alice">—</div>
        </button>
      </div>
    </div>
  </div>

  <div class="screen" id="s-tasks">
    <div class="top-bar">
      <button class="back-btn" onclick="goBack()">← Voltar</button>
      <div class="avatar-sm" id="t-avatar"></div>
      <h2 id="t-title"></h2>
      <div class="stars-pill" id="t-stars"></div>
    </div>
    <div class="days-scroll" id="days-row"></div>
    <div class="prog-wrap">
      <div class="prog-top"><span id="prog-txt"></span><span id="prog-pct"></span></div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="period-tabs" id="period-tabs"></div>
    <div class="tasks-list" id="tasks-list"></div>
    <div class="action-bar">
      <button class="action-btn red" onclick="confirmReset()">↺ Resetar dia</button>
      <button class="action-btn" onclick="showSummary()">📊 Resumo semanal</button>
    </div>
  </div>
</div>

<div class="overlay" id="sum-overlay" onclick="overlayClick(event)">
  <div class="sheet">
    <h3>Resumo da semana</h3>
    <div class="sub" id="sum-week"></div>
    <div id="sum-content"></div>
    <button class="close-btn" onclick="closeSummary()">Fechar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyBz_D2K_VNcfozFjt9FessBIcSp38tvbpGb0U_1buvcNxtgRJvaIvXgRdtQTfUih1j3w/exec";
const MESES = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const DIAS_NOME = ["Segunda","Terça","Quarta","Quinta","Sexta","Sábado","Domingo"];
const DIAS_CURTO = ["SEG","TER","QUA","QUI","SEX","SAB","DOM"];
const PERIODS = ["Manhã","Tarde","Noite"];
const CFG = {
  pedro: { label:"Pedro", initials:"PE", avCl:"av-pedro", spCl:"sp-pedro", dcCl:"dc-pedro", ddCl:"dd-pedro", ptCl:"pt-pedro", pfCl:"pf-pedro", cbCl:"cb-pedro", bdCl:"bd-pedro" },
  alice: { label:"Alice",  initials:"AL", avCl:"av-alice",  spCl:"sp-alice",  dcCl:"dc-alice",  ddCl:"dd-alice",  ptCl:"pt-alice",  pfCl:"pf-alice",  cbCl:"cb-alice",  bdCl:"bd-alice" }
};

let allTasks = [], progress = {}, cbCount = 0;
let state = { profile:"pedro", day:0, period:0 };

function getWeekDates() {
  const today = new Date();
  const dow = today.getDay();
  const off = dow === 0 ? -6 : 1 - dow;
  const mon = new Date(today);
  mon.setDate(today.getDate() + off);
  return Array.from({length:7}, (_,i) => { const d = new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
const weekDates = getWeekDates();
const todayIdx = (() => { const d = new Date().getDay(); return d===0?6:d-1; })();

document.getElementById("sel-date").textContent =
  DIAS_NOME[todayIdx] + ", " + weekDates[todayIdx].getDate() + " de " + MESES[weekDates[todayIdx].getMonth()];

// JSONP loader — evita CORS
function jsonp(params, cbName) {
  return new Promise((resolve, reject) => {
    const name = cbName || ("_cb" + (++cbCount));
    const script = document.createElement("script");
    const timeout = setTimeout(() => { cleanup(); reject("timeout"); }, 10000);
    function cleanup() { clearTimeout(timeout); delete window[name]; if (script.parentNode) script.parentNode.removeChild(script); }
    window[name] = function(data) { cleanup(); resolve(data); };
    params.callback = name;
    script.src = API + "?" + Object.entries(params).map(([k,v]) => k+"="+encodeURIComponent(v)).join("&");
    script.onerror = () => { cleanup(); reject("script error"); };
    document.head.appendChild(script);
  });
}

// POST via fetch (guardado progresso)
async function apiPost(body) {
  try {
    await fetch(API, { method:"POST", mode:"no-cors", body: JSON.stringify(body),
      headers: {"Content-Type":"application/json"} });
  } catch(e) {}
}

async function loadData() {
  try {
    const [tasks, prog] = await Promise.all([
      jsonp({action:"getTasks"}),
      jsonp({action:"getProgress"})
    ]);
    allTasks = Array.isArray(tasks) ? tasks : [];
    progress = (prog && typeof prog === "object" && !Array.isArray(prog)) ? prog : {};
    document.getElementById("sel-loading").style.display = "none";
    document.getElementById("profiles-wrap").style.display = "flex";
    renderSelector();
  } catch(e) {
    document.getElementById("sel-loading").innerHTML = "Erro ao carregar. Verifica a ligação e tenta novamente.";
  }
}

function taskKey(t, idx) { return t.perfil+"_"+t.dia+"_"+t.periodo+"_"+idx; }

function getTasksFor(p, day, period) {
  return allTasks.map((t,i)=>({...t,_i:i}))
    .filter(t => t.perfil===p && Number(t.dia)===day && Number(t.periodo)===period);
}
function getDayTasks(p, day) {
  return allTasks.map((t,i)=>({...t,_i:i})).filter(t => t.perfil===p && Number(t.dia)===day);
}
function totalStars(p) {
  return allTasks.map((t,i)=>({...t,_i:i}))
    .filter(t => t.perfil===p && progress[taskKey(t,t._i)])
    .reduce((a,t) => a+Number(t.estrelas), 0);
}

function renderSelector() {
  ["pedro","alice"].forEach(k => {
    const mine = allTasks.map((t,i)=>({...t,_i:i})).filter(t=>t.perfil===k);
    const done = mine.filter(t=>progress[taskKey(t,t._i)]).length;
    const s = totalStars(k);
    document.getElementById("meta-"+k).textContent = "★ "+s+" estrelas · "+done+"/"+mine.length+" tarefas";
  });
}

function openProfile(p) {
  state.profile=p; state.day=todayIdx; state.period=0;
  document.getElementById("s-select").classList.remove("active");
  document.getElementById("s-tasks").classList.add("active");
  renderTasks();
}
function goBack() {
  document.getElementById("s-tasks").classList.remove("active");
  document.getElementById("s-select").classList.add("active");
  renderSelector();
}

function renderTasks() {
  const p = state.profile, cfg = CFG[p];
  const av = document.getElementById("t-avatar");
  av.textContent = cfg.initials; av.className = "avatar-sm "+cfg.avCl;
  document.getElementById("t-title").textContent = cfg.label;
  const sp = document.getElementById("t-stars");
  sp.textContent = "★ "+totalStars(p); sp.className = "stars-pill "+cfg.spCl;

  document.getElementById("days-row").innerHTML = weekDates.map((date,i) => {
    const hasTasks = getDayTasks(p,i).length > 0;
    const dot = hasTasks ? '<div class="day-dot '+cfg.ddCl+'"></div>' : "";
    const isToday = i===todayIdx ? " today-chip" : "";
    return '<div class="day-chip '+cfg.dcCl+(i===state.day?" active":"")+isToday+'" onclick="setDay('+i+')">'
      +'<div class="day-name">'+DIAS_CURTO[i]+'</div>'
      +'<div class="day-date">'+date.getDate()+'</div>'
      +'<div class="day-month">'+MESES[date.getMonth()]+'</div>'
      +dot+'</div>';
  }).join("");

  setTimeout(() => {
    const chips = document.querySelectorAll(".day-chip");
    if (chips[state.day]) chips[state.day].scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});
  }, 50);

  const allDay = getDayTasks(p, state.day);
  const done = allDay.filter(t=>progress[taskKey(t,t._i)]).length;
  const total = allDay.length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById("prog-txt").textContent =
    DIAS_NOME[state.day]+" "+weekDates[state.day].getDate()+" "+MESES[weekDates[state.day].getMonth()]+": "+done+"/"+total+" feitas";
  document.getElementById("prog-pct").textContent = pct+"%";
  const pf = document.getElementById("prog-fill");
  pf.className = "prog-fill "+cfg.pfCl; pf.style.width = pct+"%";

  document.getElementById("period-tabs").innerHTML = PERIODS.map((lbl,i) => {
    const pts = getTasksFor(p, state.day, i);
    const pd = pts.filter(t=>progress[taskKey(t,t._i)]).length;
    const cnt = pts.length ? pd+"/"+pts.length : "–";
    return '<button class="ptab '+cfg.ptCl+(i===state.period?" active":"")+'" onclick="setPeriod('+i+')">'+lbl+'<span class="pcnt">'+cnt+'</span></button>';
  }).join("");

  const tasks = getTasksFor(p, state.day, state.period);
  const list = document.getElementById("tasks-list");
  if (!tasks.length) { list.innerHTML = '<div class="empty">Sem tarefas neste período</div>'; return; }

  list.innerHTML = tasks.map(task => {
    const key = taskKey(task, task._i);
    const feito = !!progress[key];
    let note = "";
    if (task.nota) {
      if (task.tipo_nota==="foto") note = '<div class="task-note tn-foto">📷 '+task.nota+'</div>';
      else if (task.tipo_nota==="hora") note = '<div class="task-note tn-hora">🕐 '+task.nota+'</div>';
      else if (task.tipo_nota==="livros") note = '<div class="task-note tn-livros">📚 '+task.nota+'</div>';
      else note = '<div class="task-note">'+task.nota+'</div>';
    }
    return '<div class="task-item'+(feito?" done":"")+'" onclick="toggleTask(\''+key+'\')"><div class="checkbox '+cfg.cbCl+'">'
      +'<svg class="checkmark" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      +'</div><div class="task-body"><div class="task-label">'+task.tarefa+'</div>'+note+'</div>'
      +'<div class="badge '+cfg.bdCl+'">'+"★".repeat(Number(task.estrelas))+'</div></div>';
  }).join("");
}

function toggleTask(key) {
  progress[key] = !progress[key];
  renderTasks(); renderSelector();
  apiPost({ action:"saveProgress", data:{ [key]: progress[key] } });
  showToast(progress[key] ? "✓ Tarefa feita!" : "Tarefa desmarcada");
}

function setDay(i) { state.day=i; state.period=0; renderTasks(); }
function setPeriod(i) { state.period=i; renderTasks(); }

function confirmReset() {
  if (confirm("Resetar todas as tarefas de "+DIAS_NOME[state.day]+"?")) doResetDay();
}
function doResetDay() {
  const p = state.profile;
  getDayTasks(p, state.day).forEach(t => { progress[taskKey(t,t._i)] = false; });
  renderTasks(); renderSelector();
  apiPost({ action:"resetDay", perfil:p, dia:state.day });
  showToast("↺ Dia resetado!");
}

function showSummary() {
  document.getElementById("sum-overlay").classList.add("open");
  const w0 = weekDates[0], w6 = weekDates[6];
  document.getElementById("sum-week").textContent =
    w0.getDate()+" "+MESES[w0.getMonth()]+" – "+w6.getDate()+" "+MESES[w6.getMonth()];

  const html = ["pedro","alice"].map(p => {
    const mine = allTasks.map((t,i)=>({...t,_i:i})).filter(t=>t.perfil===p);
    const doneAll = mine.filter(t=>progress[taskKey(t,t._i)]).length;
    const starsAll = mine.filter(t=>progress[taskKey(t,t._i)]).reduce((a,t)=>a+Number(t.estrelas),0);
    const daysHtml = DIAS_CURTO.map((d,i) => {
      const dt = mine.filter(t=>Number(t.dia)===i);
      const dd = dt.filter(t=>progress[taskKey(t,t._i)]).length;
      const pct = dt.length ? Math.round(dd/dt.length*100) : 0;
      return '<div class="sum-row"><div class="sum-day">'+d+'</div>'
        +'<div class="sum-bar-wrap"><div class="sum-bar sb-'+p+'" style="width:'+pct+'%"></div></div>'
        +'<div class="sum-pct">'+pct+'%</div></div>';
    }).join("");
    return '<div class="sum-profile"><h4 class="h4-'+p+'">'+CFG[p].label+'</h4>'
      +daysHtml+'<div class="sum-total">'+doneAll+'/'+mine.length+' tarefas · ★ '+starsAll+' estrelas</div></div>';
  }).join('<hr class="divider">');

  document.getElementById("sum-content").innerHTML = html;
}

function closeSummary() { document.getElementById("sum-overlay").classList.remove("open"); }
function overlayClick(e) { if (e.target===document.getElementById("sum-overlay")) closeSummary(); }

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

// Reset automático à meia-noite
function scheduleReset() {
  const now = new Date();
  const tomorrow = new Date(now);
  tomorrow.setDate(now.getDate()+1);
  tomorrow.setHours(0,0,10,0);
  setTimeout(() => {
    const yesterday = todayIdx===0?6:todayIdx-1;
    ["pedro","alice"].forEach(p => {
      getDayTasks(p, yesterday).forEach(t => { progress[taskKey(t,t._i)] = false; });
      apiPost({ action:"resetDay", perfil:p, dia:yesterday });
    });
    scheduleReset();
  }, tomorrow - now);
}

loadData();
scheduleReset();
</script>
